name: Backend Tests

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/**"
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          # Keep CI aligned with the local mise config and backend Docker image.
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --no-audit --no-fund

      - name: Run backend coverage
        run: |
          set +e
          npm run coverage | tee "$RUNNER_TEMP/backend-coverage.txt"
          coverage_status=${PIPESTATUS[0]}
          set -e

          # Surface the built-in Node coverage table directly in the Actions job summary.
          {
            echo "## Backend coverage"
            echo '```text'
            sed -n '/# start of coverage report/,/# end of coverage report/p' "$RUNNER_TEMP/backend-coverage.txt"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          exit "$coverage_status"
