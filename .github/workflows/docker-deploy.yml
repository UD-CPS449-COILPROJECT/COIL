name: Deploy Docker Images

on:
  push:
    tags:
      - "**"

env:
  DOCKER_REPO: bambam955/coil-team2

jobs:
  publish-images:
    # Push events also fire for tag deletions and force-updates.
    # Only publish images when a brand-new tag is pushed to the remote.
    if: github.event.created == true && github.event.deleted == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            stable_tag: frontend
          - service: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            stable_tag: backend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          # Keep the existing service tags for deployment targets, and
          # publish a release-specific tag for traceability and rollback.
          tags: |
            ${{ env.DOCKER_REPO }}:${{ matrix.stable_tag }}
            ${{ env.DOCKER_REPO }}:${{ matrix.stable_tag }}-${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
