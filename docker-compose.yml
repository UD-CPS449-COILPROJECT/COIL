services:
  backend:
    build:
      context: ./backend
    container_name: coil-backend
    restart: unless-stopped
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: coil-frontend
    depends_on:
      - backend
    environment:
      COIL_BACKEND_URL: backend:8080
    restart: unless-stopped
    ports:
      - "3000:80"
